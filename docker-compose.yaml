#version: '3.8'

services:
  # Serviço do Banco de Dados PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_DB: api_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
    ports:
      - "5432:5432" # Expõe a porta para você acessar o banco via DBeaver/PgAdmin localmente
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Serviço da sua API Spring Boot
  api:
    build: .
    container_name: springboot-api
    restart: always
    ports:
      - "8080:8080" # Porta para acessar a API e o Swagger
    depends_on:
      - db
    environment:
      # Essas variáveis batem exatamente com o que está no seu application.yml
      - DB_URL=jdbc:postgresql://db:5432/api_db
      - DB_USERNAME=admin
      - DB_PASSWORD=admin_password
      # Chave secreta para o JWT gerenciar seus tokens
      - APP_JWT_SECRET=sua_chave_secreta_jwt_muito_longa_e_segura_aqui_2026

volumes:
  postgres_data: